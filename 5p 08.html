        .letter-box { width: 100px; height: 100px; display: inline-flex; align-items: center; justify-content: center; font-size: 56px; font-weight: bold; background: #f9f0e3; border-radius: 24px; cursor: pointer; margin: 0 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .ai-section { margin-bottom: 28px; }
        .ai-title { font-size: 20px; font-weight: bold; color: #7a5a2a; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; border-left: 3px solid #d4af37; padding-left: 16px; }

        .ai-input-field { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.05); border: 1px solid #e0c8a0; color: #2d2417; margin-top: 10px; }
        .ai-submit-btn { background: linear-gradient(90deg, #d4af37, #b38f2c); border: none; padding: 8px 24px; border-radius: 40px; color: #2d2417; cursor: pointer; margin-top: 10px; font-weight: 500; }

<body>

<!-- 意识深渊加载页 -->
<div id="abyss-screen">

<!-- 大厅 -->

            <div class="portal-btn" data-section="history"><i class="fa fa-landmark"></i><span>📜 历史档案馆</span><small>思想巨匠的殿堂</small></div>
            <div class="portal-btn" data-section="dream"><i class="fa fa-moon-o"></i><span>🌙 梦的邮局</span><small>弗洛伊德·霍布森·认知学派</small></div>

<script>
// ========== 序章逻辑 ==========
(function() {
    const abyss = document.getElementById('abyss-screen');
    const mist = document.getElementById('mist-layer');
    const sigil = document.getElementById('abyss-sigil');
    const line1 = document.getElementById('abyss-line1');
    const line2 = document.getElementById('abyss-line2');
    const inscription = document.getElementById('inscription-area');
    const skip = document.getElementById('skip-abyss');
    let step = 0, canAdvance = true;
    function fadeMist() { if(mist) mist.style.opacity = '0'; if(sigil) sigil.style.opacity = '1'; }
    function showInscription() { if(inscription) inscription.style.opacity = '1'; }
    function openHall() {
        if(!abyss) return;
        abyss.style.opacity = '0';
        setTimeout(() => {
            abyss.style.display = 'none';
            const hall = document.getElementById('hall-screen');
            if(hall) hall.classList.add('hall-visible');
            loadUserStatus();
        }, 1000);
    }
    function advanceStory() {
        if(!canAdvance) return;
        canAdvance = false;
        if(step === 0) { line1.classList.add('visible'); showInscription(); step = 1; setTimeout(() => { canAdvance = true; }, 900); }
        else if(step === 1) { line1.style.display = 'none'; line2.style.display = 'block'; setTimeout(() => line2.classList.add('visible'), 30); step = 2; setTimeout(() => { canAdvance = true; }, 900); }
        else if(step === 2) { openHall(); step = 3; canAdvance = true; }
    }
    function skipToHall() { openHall(); }
    abyss.addEventListener('click', (e) => { if(e.target === skip || skip.contains(e.target)) return; advanceStory(); });
    if(skip) skip.addEventListener('click', (e) => { e.stopPropagation(); skipToHall(); });
    setTimeout(() => fadeMist(), 200);
    setTimeout(() => { if(step === 0) advanceStory(); }, 2800);
})();

// 登录系统
let currentUserName = null, currentTitle = "未名旅者";
const titleBadge = document.getElementById('user-title-badge');
const loginBtn = document.getElementById('hall-login-btn');
const metaReturn = document.getElementById('meta-return-btn');
function loadUserStatus() { const savedName = localStorage.getItem('psycho_name'); if(savedName) { currentUserName = savedName; currentTitle = localStorage.getItem('psycho_title') || "低语者"; updateTitleDisplay(); } }
function updateTitleDisplay() { if(titleBadge) titleBadge.innerHTML = currentUserName ? `<i class="fa fa-feather"></i> ${currentUserName} · ${currentTitle}` : `<i class="fa fa-crown"></i> 未名旅者`; }
function openLoginModal() { let newName = prompt("✧ 刻下你的真名（探险家昵称）✧", currentUserName || "梦境行者"); if(newName && newName.trim()) { currentUserName = newName.trim(); localStorage.setItem('psycho_name', currentUserName); localStorage.setItem('psycho_title', "初临深渊者"); currentTitle = "初临深渊者"; updateTitleDisplay(); alert(`「${currentUserName}」你的灵魂已被深渊铭记`); } }
if(loginBtn) loginBtn.addEventListener('click', openLoginModal);
if(metaReturn) metaReturn.addEventListener('click', () => location.reload());
document.querySelectorAll('.portal-btn').forEach(btn => { btn.addEventListener('click', () => { const section = btn.getAttribute('data-section'); const target = document.getElementById(`section-${section}`); if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }); });
</script>

    let negExpActive = false, negExpStep = 0, negWaitingForPrime = false, negWaitingForProbe = false;
    let negProbeStart = 0, negCurrentPrimeTarget = '', negCurrentProbeTarget = '';
    let negTimer = null, negResults = [];
    const negTrials = [
        { type: 'warmup', hint: 'A', primeTarget: 'A', primeIgnore: 'B', probeTarget: 'A', probeIgnore: 'C' },

        { type: 'critical', hint: 'B', primeTarget: 'A', primeIgnore: 'B', probeTarget: 'B', probeIgnore: 'A' },
        { type: 'control', hint: 'C', primeTarget: 'C', primeIgnore: 'D', probeTarget: 'C', probeIgnore: 'E' }
    ];
    
    function setLetterStyle(el, isTarget, letter) {
        el.innerText = letter;
        if(isTarget) {
            el.style.color = '#ff5555';
            el.style.fontWeight = 'bold';
        } else {
            el.style.color = '#88ff88';
            el.style.fontWeight = 'normal';
        }
    }
    
    function resetNegPrimingExp() {
        clearTimeout(negTimer);
        negExpActive = false; negExpStep = 0; negResults = [];

        document.getElementById('primingLeft').style.color = '#333';
        document.getElementById('primingRight').style.color = '#333';
        document.getElementById('targetHint').innerText = '准备就绪';
        document.getElementById('primingMessage').innerText = '📌 点击【开始体验】';
        document.getElementById('primingResultsArea').innerHTML = '📊 结束后显示反应时与实验意义';
        document.getElementById('primingStartBtn').disabled = false;
    }
    
    function startNegPrimingExp() {
        if(negExpActive) return;
        resetNegPrimingExp();
        negExpActive = true;
        document.getElementById('primingStartBtn').disabled = true;
        runNegNext();
    }
    
    function runNegNext() {
        if(negExpStep >= negTrials.length) { finishNegExp(); return; }
        const tri = negTrials[negExpStep];
        document.getElementById('targetHint').innerHTML = `目标：${tri.hint}`;
        document.getElementById('primingLeft').innerHTML = '?';
        document.getElementById('primingRight').innerHTML = '?';
        document.getElementById('primingMessage').innerHTML = `试次 ${negExpStep+1}/${negTrials.length}｜默念红色字母再点击`;
        negTimer = setTimeout(showNegFixation, 1200);
    }
    
    function showNegFixation() {
        document.getElementById('targetHint').innerHTML = '+ 注视 +';
        document.getElementById('primingLeft').innerHTML = '+';
        document.getElementById('primingRight').innerHTML = '';
        negTimer = setTimeout(showNegPrime, 600);
    }
    
    function showNegPrime() {
        const tri = negTrials[negExpStep];
        negCurrentPrimeTarget = tri.primeTarget;
        const leftTarget = Math.random() < 0.5;
        if(leftTarget) {
            setLetterStyle(document.getElementById('primingLeft'), true, tri.primeTarget);
            setLetterStyle(document.getElementById('primingRight'), false, tri.primeIgnore);
        } else {
            setLetterStyle(document.getElementById('primingLeft'), false, tri.primeIgnore);
            setLetterStyle(document.getElementById('primingRight'), true, tri.primeTarget);
        }
        negWaitingForPrime = true;
        document.getElementById('primingMessage').innerHTML = '启动｜先默念红色字母|再点击红色字母';
    }
    
    function showNegProbe() {
        const tri = negTrials[negExpStep];
        negCurrentProbeTarget = tri.probeTarget;
        const leftTarget = Math.random() < 0.5;
        if(leftTarget) {
            setLetterStyle(document.getElementById('primingLeft'), true, tri.probeTarget);
            setLetterStyle(document.getElementById('primingRight'), false, tri.probeIgnore);
        } else {
            setLetterStyle(document.getElementById('primingLeft'), false, tri.probeIgnore);
            setLetterStyle(document.getElementById('primingRight'), true, tri.probeTarget);
        }
        negWaitingForProbe = true;
        negProbeStart = performance.now();
        document.getElementById('primingMessage').innerHTML = '探测｜先默念红色字母|再点击红色字母';
    }
    
    function handleNegClick(side) {
        if(!negExpActive) return;
        const isPrimePhase = negWaitingForPrime && !negWaitingForProbe;
        const currentTarget = isPrimePhase ? negCurrentPrimeTarget : negCurrentProbeTarget;
        const clickedElement = side === 'left' ? document.getElementById('primingLeft') : document.getElementById('primingRight');
        if(clickedElement.innerText !== currentTarget) {
            document.getElementById('primingMessage').innerHTML = '⚠️ 请点红色字母！';
            return;
        }
        
        if(isPrimePhase) {
            negWaitingForPrime = false;
            document.getElementById('primingLeft').innerHTML = '';
            document.getElementById('primingRight').innerHTML = '';
            negTimer = setTimeout(showNegProbe, 500);
        } else if(negWaitingForProbe) {
            negWaitingForProbe = false;
            negResults.push({ type: negTrials[negExpStep].type, rt: performance.now() - negProbeStart });
            negExpStep++;
            document.getElementById('primingLeft').innerHTML = '';
            document.getElementById('primingRight').innerHTML = '';
            negTimer = setTimeout(runNegNext, 1000);
        }
    }
    
    function finishNegExp() {
        negExpActive = false;
        document.getElementById('primingLeft').innerHTML = '?';
        document.getElementById('primingRight').innerHTML = '?';
        document.getElementById('targetHint').innerHTML = '实验结束';
        
        const crit = negResults.find(r => r.type === 'critical')?.rt || 0;
        const ctrl = negResults.find(r => r.type === 'control')?.rt || 0;
        const diff = Math.round(crit - ctrl);
        
        document.getElementById('primingResultsArea').innerHTML = `

                默读让你深度加工字母，负启动效果更明显。
            </div>
        `;
        document.getElementById('primingStartBtn').disabled = false;
    }

        const display = document.getElementById('blinkDisplay');
        const letterPool = 'ABCDEFGHJKLMNOPQRSTUVWXYZ';
        let sequence = [];
        for(let i = 0; i < 18; i++) sequence.push(letterPool[Math.floor(Math.random() * letterPool.length)]);
        const t1Pos = 5;
        t1 = sequence[t1Pos];
        const t2Pos = t1Pos + 3 + Math.floor(Math.random() * 3);
        t2Exist = Math.random() > 0.4;
        if(t2Exist && t2Pos < sequence.length) sequence[t2Pos] = 'X';
        let idx = 0;
        blinkTimer = setInterval(() => {
            if(idx >= sequence.length) {
                clearInterval(blinkTimer);
                display.innerHTML = '?';
                step = 1;
                document.getElementById('blinkResult').innerHTML = '播放结束，先回答是否看见彩色字母';
                document.getElementById('btnT1a').disabled = false;
                document.getElementById('btnT1b').disabled = false;
                return;
            }
            if(idx === t1Pos) display.innerHTML = '<span style="color:#ff5555">' + sequence[idx] + '</span>';
            else display.innerHTML = sequence[idx];
            idx++;
        }, 100);
    }

        document.getElementById('blinkDisplay').innerHTML = '✓';

        document.getElementById('btnNo').disabled = true;
        setTimeout(resetBlink, 3000);
    }

function bindDichoticEvents() {
    if (currentPhase === 'intro') {
        document.getElementById('dichoticStartChoose')?.addEventListener('click', () => {
            currentPhase = 'choose';
            renderDichoticExperiment();
        });
    } else if (currentPhase === 'choose') {
        document.getElementById('dichoticChooseLeft')?.addEventListener('click', () => {

            currentPhase = 'ready';
            renderDichoticExperiment();
        });
        document.getElementById('dichoticChooseRight')?.addEventListener('click', () => {
            attendedEar = 'right';
            currentPhase = 'ready';
            renderDichoticExperiment();
        });
    } else if (currentPhase === 'ready') {
        document.getElementById('dichoticStartShow')?.addEventListener('click', () => {
            currentPhase = 'show';
            renderDichoticExperiment();
            startDichoticPresentation();
        });
    } else if (currentPhase === 'recall') {
        document.getElementById('dichoticSubmitRecall')?.addEventListener('click', () => {
            const input = document.getElementById('dichoticRecallInput');
            userRecall = input?.value.trim() || '';
            if (!userRecall) { alert('请输入字母序列'); return; }
            const nonAttended = attendedEar === 'left' ? rightLetters : leftLetters;
            if (Math.random() < 0.5) {
                probeLetter = nonAttended[Math.floor(Math.random() * nonAttended.length)];
                probeCorrect = true;
            } else {
                const unused = ['X', 'Y', 'Z', 'Q'];
                probeLetter = unused[Math.floor(Math.random() * unused.length)];
                probeCorrect = false;
            }
            currentPhase = 'probe';
            renderDichoticExperiment();
        });
    } else if (currentPhase === 'probe') {
        document.getElementById('dichoticProbeYes')?.addEventListener('click', () => {
            probeCorrect = (probeCorrect === true);
            currentPhase = 'result';
            renderDichoticExperiment();
        });
        document.getElementById('dichoticProbeNo')?.addEventListener('click', () => {
            probeCorrect = (probeCorrect === false);
            currentPhase = 'result';
            renderDichoticExperiment();
        });
    } else if (currentPhase === 'result') {
        document.getElementById('dichoticRestart')?.addEventListener('click', () => {
            resetDichoticExperiment();
            renderDichoticExperiment();
        });
    }
}

function startDichoticPresentation() {
    const showArea = document.getElementById('dichoticShowArea');
    if (!showArea) return;
    let pairIndex = 0;
    
    function showPair() {
        if (pairIndex >= totalPairs) {
            currentPhase = 'recall';
            renderDichoticExperiment();
            return;
        }
        const leftChar = leftLetters[pairIndex];
        const rightChar = rightLetters[pairIndex];
        showArea.innerHTML = `
            <div class="dichotic-exp-left ${attendedEar === 'left' ? 'dichotic-exp-active' : ''}">${leftChar}</div>
            <div class="dichotic-exp-right ${attendedEar === 'right' ? 'dichotic-exp-active' : ''}">${rightChar}</div>
        `;
        pairIndex++;
        setTimeout(() => {
            if (pairIndex < totalPairs) {
                showArea.innerHTML = `<div class="dichotic-exp-left">?</div><div class="dichotic-exp-right">?</div>`;
                setTimeout(showPair, 200);
            } else {
                showPair();
            }
        }, displayTime);
    }
    showPair();
}
